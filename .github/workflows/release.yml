name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Pre-release validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Install server dependencies
        working-directory: server
        run: npm install

      - name: Install UI dependencies
        working-directory: ui
        run: npm install

      - name: Build UI
        working-directory: ui
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Verify server starts
        working-directory: server
        run: |
          node index.mjs &
          SERVER_PID=$!
          sleep 2
          curl -sf http://localhost:3002/api/summary || echo "No session DB (expected in release validation)"
          kill $SERVER_PID 2>/dev/null || true

      - name: Syntax check CLI and extension entry points
        run: |
          node --check ./bin/cli.mjs
          node --check ./.github/extensions/copilot-insights/extension.mjs
          bash -n ./scripts/install.sh
          pwsh -NoLogo -NoProfile -Command '$errors = $null; [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path "./scripts/install.ps1"), [ref]$null, [ref]$errors) | Out-Null; if ($errors.Count) { $errors | ForEach-Object { Write-Error $_ }; exit 1 }'

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✅ Version $PKG_VERSION matches tag"

  release:
    name: Create GitHub Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Install server dependencies
        working-directory: server
        run: npm install

      - name: Install UI dependencies
        working-directory: ui
        run: npm install

      - name: Build UI
        working-directory: ui
        run: npm run build

      - name: Pack tarball
        run: npm pack

      - name: Generate checksums
        run: |
          sha256sum copilot-insights-*.tgz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            copilot-insights-*.tgz
            checksums.txt
          generate_release_notes: true
