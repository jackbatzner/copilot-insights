name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  validate:
    name: Pre-release validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json
            server/package-lock.json

      - name: Install & build
        run: npm run setup

      - name: Lint
        run: npm run lint

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✅ Version $PKG_VERSION matches tag"

      - name: Dry-run publish
        run: npm publish --dry-run

  release:
    name: Publish
    needs: validate
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install UI dependencies & build
        run: cd ui && npm ci && npm run build

      - name: Install server dependencies
        run: cd server && npm ci --omit=dev

      - name: Pack tarball
        run: npm pack

      - name: Generate checksums
        run: |
          sha256sum copilot-insights-*.tgz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            copilot-insights-*.tgz
            checksums.txt
          generate_release_notes: true

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
